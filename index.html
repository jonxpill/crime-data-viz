<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crime Data-Viz · Cape Town robbery</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #05060a; overflow: hidden; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      .hud {
        position: fixed;
        left: 16px;
        bottom: 14px;
        font: 12px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
        color: #8792a6;
        letter-spacing: 0.02em;
        pointer-events: none;
        user-select: none;
        /* Boxed so the legend stays readable even when glowing dots are behind it on a zoom-in. */
        padding: 9px 13px;
        border-radius: 8px;
        background: rgba(6, 8, 13, 0.66);
        border: 1px solid rgba(140, 170, 210, 0.10);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
      }
      .hud b { color: #d4dcef; font-weight: 500; }
      .hud .hint { color: #ffce86; }
      #fps {
        position: fixed; right: 14px; top: 12px;
        font: 12px ui-monospace, monospace; color: #6b7689;
        padding: 4px 9px; border-radius: 6px;
        background: rgba(6, 8, 13, 0.6);
        backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="hud">
      <div><b>Cape Town</b> — <span id="crime">robbery</span> &nbsp;·&nbsp; <span id="year">—</span> &nbsp;·&nbsp; <span id="count" style="color:#8792a6;"></span></div>
      <div><span class="hint">space</span> play/pause &nbsp;·&nbsp; <span class="hint">&larr; &rarr;</span> year &nbsp;·&nbsp; <span class="hint">&uarr; &darr;</span> crime &nbsp;·&nbsp; <span class="hint">M</span> map &nbsp;·&nbsp; <span class="hint">T</span> terrain &nbsp;·&nbsp; <span class="hint">P</span> pie &nbsp;·&nbsp; <span class="hint">3</span> compare &nbsp;·&nbsp; <span class="hint">scroll</span> zoom &nbsp;·&nbsp; <span class="hint">drag</span> pan</div>
      <div id="flag" style="color:#5e6a52; margin-top:4px;">◆ real SAPS robbery</div>
    </div>
    <div id="fps"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
