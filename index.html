<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crime Data-Viz · Stage 0 spike</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #05060a; overflow: hidden; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      .hud {
        position: fixed;
        left: 22px;
        bottom: 20px;
        font: 12px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
        color: #6b7689;
        letter-spacing: 0.02em;
        pointer-events: none;
        user-select: none;
      }
      .hud b { color: #cdd6ee; font-weight: 500; }
      .hud .hint { color: #ffce86; }
      #fps { position: fixed; right: 20px; top: 16px; font: 12px ui-monospace, monospace; color: #46506a; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="hud">
      <div><b>Cape Town</b> — robbery &nbsp;·&nbsp; <span id="year">—</span></div>
      <div><span class="hint">space</span> play/pause &nbsp;·&nbsp; <span class="hint">&larr; &rarr;</span> step year &nbsp;·&nbsp; <span class="hint">scroll</span> zoom &nbsp;·&nbsp; <span class="hint">drag</span> pan</div>
      <div id="flag" style="color:#5e6a52; margin-top:4px;">◆ real SAPS robbery · 2005/06–2015/16</div>
    </div>
    <div id="fps"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
